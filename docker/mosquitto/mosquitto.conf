# ─── Red ──────────────────────────────────────────────────────────────────────
listener 1883
protocol mqtt

# WebSockets (útil para debug desde browser)
listener 9001
protocol websockets

# ─── Autenticación ────────────────────────────────────────────────────────────
allow_anonymous false
password_file /mosquitto/config/passwd

# ─── Persistencia ─────────────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ─── Logging ──────────────────────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
