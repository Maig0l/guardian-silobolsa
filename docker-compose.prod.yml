name: guardian-silobolsa-prod

services:

  # ── MariaDB ────────────────────────────────────────────────
  mariadb:
    image: mariadb:11
    container_name: guardian_mariadb_prod
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb_prod_data:/var/lib/mysql
    networks:
      - guardian_prod_net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Mosquitto MQTT ─────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: guardian_mosquitto_prod
    restart: always
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_prod_data:/mosquitto/data
      - mosquitto_prod_logs:/mosquitto/log
    networks:
      - guardian_prod_net
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "test", "-m", "health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Backend ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: guardian_backend_prod
    restart: always
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: mariadb
      MQTT_BROKER_URL: mqtt://mosquitto
    depends_on:
      mariadb:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    networks:
      - guardian_prod_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: guardian_frontend_prod
    restart: always
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    depends_on:
      - backend
    networks:
      - guardian_prod_net

  # ── Nginx Reverse Proxy ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: guardian_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend
    networks:
      - guardian_prod_net

volumes:
  mariadb_prod_data:
  mosquitto_prod_data:
  mosquitto_prod_logs:

networks:
  guardian_prod_net:
    driver: bridge
