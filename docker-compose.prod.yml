version: '3.8'

services:
  # Database
  mariadb:
    image: mariadb:10.11
    container_name: guardian-mariadb-prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb_prod_data:/var/lib/mysql
    networks:
      - guardian-prod-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # MQTT Broker
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: guardian-mosquitto-prod
    restart: always
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_prod_data:/mosquitto/data
      - mosquitto_prod_logs:/mosquitto/log
    networks:
      - guardian-prod-network
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "test", "-m", "health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend (Production)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: guardian-backend-prod
    restart: always
    environment:
      NODE_ENV: production
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      MQTT_CLIENT_ID: guardian_backend_prod
      BACKEND_PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mariadb:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    networks:
      - guardian-prod-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (Production)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: guardian-frontend-prod
    restart: always
    environment:
      VITE_API_BASE_URL: http://backend:3000/api
      VITE_WS_URL: ws://backend:3000
    depends_on:
      - backend
    networks:
      - guardian-prod-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: guardian-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend
    networks:
      - guardian-prod-network

volumes:
  mariadb_prod_data:
  mosquitto_prod_data:
  mosquitto_prod_logs:

networks:
  guardian-prod-network:
    driver: bridge
