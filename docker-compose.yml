name: guardian-silobolsa

services:

  # ── MariaDB ────────────────────────────────────────────────
  mariadb:
    image: mariadb:11
    container_name: guardian_mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
      MARIADB_DATABASE: ${DB_NAME:-guardian_silobolsa}
      MARIADB_USER: ${DB_USER:-guardian}
      MARIADB_PASSWORD: ${DB_PASSWORD:-guardian_pass}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - guardian_net

  # ── Mosquitto MQTT ─────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: guardian_mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./docker/mosquitto:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    networks:
      - guardian_net

  # ── Backend ────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: guardian_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: mariadb
      MQTT_BROKER_URL: mqtt://mosquitto
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./backend/src:/app/src
    depends_on:
      mariadb:
        condition: service_healthy
      mosquitto:
        condition: service_started
    networks:
      - guardian_net

  # ── Frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: guardian_frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000/api}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    networks:
      - guardian_net

volumes:
  mariadb_data:
  mosquitto_data:
  mosquitto_logs:

networks:
  guardian_net:
    driver: bridge
